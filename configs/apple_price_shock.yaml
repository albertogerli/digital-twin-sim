description: This simulation models the market, reputational, and consumer-response
  effects of Apple raising iPhone prices by 40% worldwide. It tracks competitor counter-campaigns,
  media framing, analyst sentiment, and how brand loyalty, affordability concerns,
  and social backlash shape demand over time.
