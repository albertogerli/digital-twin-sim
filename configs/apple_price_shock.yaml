initial_event: Apple announces a surprise 40% global price increase across all iPhone
  models, framing the move as necessary to offset supply chain costs and fund AI chip
  investments. The announcement triggers immediate backlash from consumers, especially
  on social media, while Samsung and Google launch coordinated counter-campaigns emphasizing
  value and innovation. Analysts and investors begin debating whether Apple's brand
  loyalty and ecosystem lock-in can absorb the shock or whether demand will shift
  toward rival devices.
