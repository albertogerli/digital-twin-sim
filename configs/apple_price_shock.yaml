scenario_context: The simulation takes place in a highly competitive global smartphone
  market where premium pricing, ecosystem loyalty, carrier subsidies, and upgrade
  cycles strongly influence consumer behavior. Apple is attempting to protect margins
  and finance next-generation AI hardware, but the move risks accelerating churn,
  damaging brand sentiment, and giving rivals a rare opening to capture dissatisfied
  users.
