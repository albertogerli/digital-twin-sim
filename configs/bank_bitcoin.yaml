initial_event: A top-tier European bank issues an unexpected press release stating
  that it will allocate a portion of its reserve portfolio to Bitcoin. The announcement
  cites diversification, inflation hedging, and strategic innovation, but it immediately
  raises concerns about volatility, capital adequacy, custody risk, and compliance.
  Regulators demand clarification, competitors reassess their own digital asset strategies,
  and crypto advocates frame the move as a historic legitimacy boost.
