scenario_context: The simulation takes place in a European financial environment shaped
  by post-crisis regulation, cautious central banking norms, and growing institutional
  interest in digital assets. The bank's decision could influence peer institutions,
  supervisory responses, customer confidence, and broader debate over whether Bitcoin
  belongs on regulated balance sheets.
