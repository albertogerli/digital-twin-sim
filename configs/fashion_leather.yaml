scenario_context: Italy's luxury fashion sector is a global symbol of craftsmanship,
  heritage, and premium branding, making material choices highly visible and politically
  salient. The transition away from animal leather intersects with broader European
  debates on sustainability regulation, ethical consumption, industrial innovation,
  and the future of luxury manufacturing.
