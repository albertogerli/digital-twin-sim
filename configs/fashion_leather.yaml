initial_event: A major Italian luxury fashion house announces it will eliminate animal
  leather from all future collections and replace it with lab-grown and plant-based
  alternatives. The company frames the move as a long-term sustainability and innovation
  strategy, promising premium quality and traceability. The announcement immediately
  sparks debate over whether the shift enhances or undermines luxury identity, craftsmanship,
  durability, and price justification. Industry rivals, consumer groups, animal rights
  advocates, and environmental organizations begin issuing public statements and social
  media campaigns.
