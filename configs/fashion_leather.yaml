num_rounds: 6
position_axis:
  negative_label: Opposes the leather ban and favors traditional animal leather
  neutral_label: Mixed or pragmatic stance focused on tradeoffs
  positive_label: Supports the leather ban and favors lab-grown/plant-based alternatives
