description: A leading Italian luxury fashion brand announces a full transition away
  from animal leather toward lab-grown and plant-based materials. The simulation tracks
  how consumers, competitors, activists, analysts, and regulators react as the brand
  tries to protect its prestige while redefining sustainability and product quality.
