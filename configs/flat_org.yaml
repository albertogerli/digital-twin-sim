initial_event: The CEO of a Fortune 500 technology company announces a complete organizational
  restructuring that eliminates all middle management layers and shifts coordination
  to AI-powered systems. Roughly 3,000 managers are told they will be reassigned,
  offered severance, or exit through a rapid transition process. Leadership frames
  the move as a bold step toward the future of work, while employees, unions, analysts,
  and industry observers immediately debate whether the change is innovative, destabilizing,
  or a pretext for cost-cutting.
