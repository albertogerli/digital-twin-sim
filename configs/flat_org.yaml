description: A Fortune 500 tech company announces a sweeping restructuring that removes
  all middle management and replaces coordination layers with AI-enabled workflows.
  The simulation tracks stakeholder reactions, internal morale, labor response, investor
  sentiment, and the operational consequences of rapidly flattening the organization.
