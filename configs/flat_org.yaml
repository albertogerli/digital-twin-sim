name: Flat Org AI Restructuring
num_rounds: 4
position_axis:
  negative_label: Opposes the restructuring; sees it as harmful, reckless, or exploitative
  neutral_label: Mixed, pragmatic, or undecided
  positive_label: Supports the restructuring; sees it as necessary, efficient, or
    visionary
round_events: {}
scenario_context: The company is under pressure to improve margins, accelerate product
  delivery, and demonstrate leadership in AI adoption amid intense competition. Internally,
  the firm has a large global workforce with established management hierarchies, active
  employee advocacy networks, and high dependence on cross-functional coordination.
  Externally, investors are watching for efficiency gains, labor groups are preparing
  responses, and the broader tech sector is evaluating whether this becomes a template
  for other firms.
