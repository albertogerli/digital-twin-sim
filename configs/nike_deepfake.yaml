description: This simulation models the launch of a viral Nike campaign that uses
  a deepfake of a deceased legendary athlete to endorse a new shoe line. It tracks
  the tension between explosive sales and engagement on one side, and escalating backlash
  from family members, ethics advocates, media, regulators, and consumers on the other.
