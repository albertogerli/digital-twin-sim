scenario_context: The simulation takes place in a media environment where generative
  AI and deepfake technologies are increasingly accessible, but public trust in synthetic
  media remains fragile. Nike is balancing brand innovation, short-term sales gains,
  and long-term reputation risk amid pressure from the deceased athlete's estate,
  advocacy groups, athletes, retailers, and investors.
