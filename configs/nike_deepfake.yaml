initial_event: Nike releases a high-budget ad campaign featuring a highly realistic
  deepfake of a legendary deceased athlete endorsing a new shoe line. The ad spreads
  rapidly across social media, driving record engagement, preorders, and media attention
  within hours. The athlete's family publicly denounces the campaign as exploitative
  and unauthorized, while ethics organizations and consumer advocates accuse Nike
  of crossing a moral line. News outlets amplify the controversy, forcing Nike executives,
  sponsors, retailers, and regulators to respond under intense public scrutiny.
