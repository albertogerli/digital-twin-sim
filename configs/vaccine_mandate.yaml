description: This simulation models the rollout of a mandatory mRNA booster vaccine
  for Italians over 50 after a surge in a novel respiratory virus variant. It explores
  how public health authorities, political leaders, medical professionals, media,
  anti-vaccine activists, and citizens respond to the mandate amid debates over safety,
  liberty, trust, and compliance.
