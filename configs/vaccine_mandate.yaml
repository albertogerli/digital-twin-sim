initial_event: The Italian government announces an emergency mandate requiring all
  citizens over 50 to receive a new mRNA booster vaccine after health agencies report
  a sharp rise in hospitalizations linked to a novel respiratory virus variant. The
  decree is framed as a temporary measure to protect vulnerable populations and prevent
  strain on the health system, but it immediately sparks protests, legal threats,
  and intense media coverage. Medical associations largely support the policy, while
  anti-vaccine groups and civil-liberties advocates denounce it as coercive and politically
  motivated. Public trust becomes the central battleground as citizens weigh safety,
  freedom, and confidence in institutions.
