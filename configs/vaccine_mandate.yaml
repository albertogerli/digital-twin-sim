metrics_to_track:
- booster uptake rate among citizens over 50
- public approval of the mandate
- trust in government health institutions
- trust in medical experts
- protest participation
- media sentiment toward the mandate
- misinformation spread index
- hospitalization rate
- legal/political resistance intensity
- regional compliance disparity
name: Italy mRNA Booster Mandate Backlash
num_rounds: 5
position_axis:
  negative_label: strong opposition to the mandate; prioritizes personal freedom,
    skepticism of evidence, or resistance to institutional authority
  neutral_label: mixed, conditional, or undecided stance balancing public health and
    civil liberties
  positive_label: strong support for the mandate; prioritizes collective protection,
    evidence-based public health, and compliance
round_events: {}
scenario_context: Italy is entering a high-pressure public health moment with rising
  case counts, overloaded hospitals in several regions, and a government seeking to
  act decisively before winter. The country has a history of polarized debate over
  vaccination policy, with regional differences in trust, healthcare access, and political
  alignment shaping public response. Media ecosystems, social platforms, and professional
  medical voices will influence whether the mandate is normalized, contested, or partially
  reversed.
